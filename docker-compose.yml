services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cloudconnect
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      # Dieser Befehl prüft, ob Postgres bereit ist, Verbindungen anzunehmen
      test: ["CMD-SHELL", "pg_isready -U user -d cloudconnect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cloud-net
  backend:
    build: ./app/backend
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: cloudconnect
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloud-net

  frontend:
    build: ./app/frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started 
    networks:
      - cloud-net

networks:
  cloud-net:
    driver: bridge

volumes:
  db-data: